deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: ${s3_bucket}
      ruler:  ${s3_bucket}
      admin:  ${s3_bucket}
    s3:
      region: ap-southeast-1
      s3ForcePathStyle: false
      insecure: false

  limits_config:
    retention_period: 168h
    allow_structured_metadata: true

serviceAccount:
  create: true
  name: ${service_account_name}
  annotations:
    eks.amazonaws.com/role-arn: ${iam_role_arn}

singleBinary:
  replicas: 1
  persistence:
    enabled: true                 
    size: 5Gi
    storageClass: gp2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  nodeSelector:
    company: comp
    project: mandatory
    nodegroup: facilities

# Turn off the scaled deployment modes
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable the extras you don't need for SingleBinary
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
test:
  enabled: false
lokiCanary:
  enabled: false
