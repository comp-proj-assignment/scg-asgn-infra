serviceAccount:
  create: true
  name: ${service_account}

# Cluster + region + VPC are passed explicitly. Without them, the
# controller falls back to IMDS (169.254.169.254) which is blocked from
# pod network on EKS-optimized AMIs by default (hop-limit=1) — symptom
# is "context deadline exceeded" calling GetMetadata.
clusterName: ${cluster_name}
region:      ${region}
vpcId:       ${vpc_id}

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# Default LB type when a Service of type LoadBalancer is created.
defaultLoadBalancerClass: service.k8s.aws/nlb

# Enable webhook (default true) so Ingress/Service mutation works.
enableServiceMutatorWebhook: true
