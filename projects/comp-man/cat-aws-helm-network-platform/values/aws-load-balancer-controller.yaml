serviceAccount:
  create: true
  name: ${service_account}
clusterName: ${cluster_name}
region:      ${region}
vpcId:       ${vpc_id}

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

defaultLoadBalancerClass: service.k8s.aws/nlb

enableServiceMutatorWebhook: true
