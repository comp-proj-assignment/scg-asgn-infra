name: project-init

# Scaffolds a new project folder under projects/{company}-{project}/
# with skeleton common-config.json + README.md, then opens a PR.
# Run once per new project. After merge, infra-request can target
# the new project via its `project` input.

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Company short code (e.g. comp)'
        required: true
        type: string
      project:
        description: 'Project short code (e.g. proj)'
        required: true
        type: string
      region:
        description: 'AWS region for the state backend'
        required: true
        type: string
        default: ap-southeast-1

permissions:
  contents: write
  pull-requests: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive paths and names
        id: derive
        run: |
          PROJECT_NAME="${{ inputs.company }}-${{ inputs.project }}"
          PROJECT_DIR="projects/${PROJECT_NAME}"
          BUCKET="${PROJECT_NAME}-tfstate"
          LOCK_TABLE="${PROJECT_NAME}-tfstate-lock"
          {
            echo "name=${PROJECT_NAME}"
            echo "dir=${PROJECT_DIR}"
            echo "bucket=${BUCKET}"
            echo "lock_table=${LOCK_TABLE}"
          } >> "$GITHUB_OUTPUT"

      - name: Refuse if project folder already exists
        run: |
          if [ -d "${{ steps.derive.outputs.dir }}" ]; then
            echo "Project folder already exists: ${{ steps.derive.outputs.dir }}" >&2
            echo "Pick a different (company, project) pair, or edit the existing folder directly." >&2
            exit 1
          fi

      - name: Scaffold project files
        run: |
          mkdir -p "${{ steps.derive.outputs.dir }}/configs"

          cat > "${{ steps.derive.outputs.dir }}/common-config.json" <<EOF
          {
            "company": "${{ inputs.company }}",
            "project": "${{ inputs.project }}",
            "remote_state": {
              "bucket": "${{ steps.derive.outputs.bucket }}",
              "region": "${{ inputs.region }}",
              "lock_table": "${{ steps.derive.outputs.lock_table }}"
            }
          }
          EOF

          cat > "${{ steps.derive.outputs.dir }}/README.md" <<EOF
          # ${{ steps.derive.outputs.name }}

          Per-project state for the \`${{ steps.derive.outputs.name }}\` project.
          The pipeline writes into this folder; everything except
          \`common-config.json\` and this \`README.md\` is generated by
          the workflows.

          ## Layout

          \`\`\`
          projects/${{ steps.derive.outputs.name }}/
          ├── common-config.json              # company / project / state backend coords
          ├── README.md                       # this file
          └── <catalog>-<service_name>/       # one folder per requested catalog instance
              │                                  e.g. cat-aws-vpc-demo, cat-aws-eks-platform
              ├── main.tf, variables.tf, …    # catalog code, copied from
              │                                  catalogs/<catalog>/<version>/
              ├── .catalog-version            # which catalog@version was rendered
              ├── backend.hcl                 # generated at provision time
              └── configs/
                  ├── config.json             # base template from the catalog
                  ├── config-nonprod.json     # rendered per-env tfvars
                  └── config-prod.json
          \`\`\`

          One slot per \`(catalog, service_name)\` pair. Request a
          second instance of the same catalog with a different
          \`service_name\` to get \`cat-aws-vpc-demo/\` and
          \`cat-aws-vpc-other/\` side by side.

          ## How it gets here

          1. **\`project-init\`** workflow created this folder + \`common-config.json\`.
          2. **\`infra-request\`** workflow stages a slot when you pick
             a \`(catalog, version, service_name)\` — opens a PR adding
             the slot dir. Per-env config files (\`config-<env>.json\`)
             are generated at request time from the catalog's
             \`config.json\` template, with \`environment\` + tag
             overlay applied.
          3. **\`infra-provision\`** workflow runs terraform against an
             existing slot — picks an env, plans, pauses for approval,
             applies.

          ## Bootstrap (one-time, after this PR merges)

          State backend (S3 bucket + DynamoDB lock table) is not
          managed by Terraform — chicken-and-egg if it were. Create
          them once with the repo Makefile:

          \`\`\`bash
          # Pull main first so projects/${{ steps.derive.outputs.name }}/common-config.json
          # is on disk, then:
          make bootstrap PROJECT=${{ steps.derive.outputs.name }}
          \`\`\`

          That reads \`common-config.json\` and creates:
          - S3 bucket \`${{ steps.derive.outputs.bucket }}\` (versioned, encrypted, public-access blocked)
          - DynamoDB table \`${{ steps.derive.outputs.lock_table }}\` (PAY_PER_REQUEST)

          Re-running is safe — both checks skip if the resources exist.

          ## Day-to-day

          - **Request a catalog:** Actions → \`infra-request\` → pick
            project + catalog + version + service_name → merge the PR.
          - **Apply / destroy:** Actions → \`infra-provision\` → pick
            project + env + action → approve the issue the workflow
            opens → it runs.
          - **Edit env config:** open the slot's
            \`configs/config-<env>.json\` in a PR. Pipeline re-applies
            on next provision.

          See the top-level \`SETUP.md\` and \`docs/01_AWS_GITHUB_ACCESS.md\`
          for one-time AWS/GitHub setup.
          EOF

      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="project-init/${{ steps.derive.outputs.name }}"
          git config user.name  "comp-init-bot"
          git config user.email "comp-init-bot@users.noreply.github.com"

          # Delete any prior failed-attempt branch on the remote.
          # GITHUB_TOKEN can CREATE a branch whose tree contains
          # workflow files, but cannot UPDATE one in a way that
          # changes workflow files (workflows: write is only grantable
          # to a PAT/App). If a previous run left a stale branch and
          # this workflow file has since been edited on main, the push
          # would be rejected.
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add "${{ steps.derive.outputs.dir }}"
          git commit -m "init project ${{ steps.derive.outputs.name }}"
          git push -u origin "$BRANCH"

          # Idempotent label create — first run on a fresh repo would
          # otherwise fail "label not found" inside gh pr create.
          gh label create project-init \
            --color 0e8a16 \
            --description "Scaffolds a new project folder" \
            --force >/dev/null 2>&1 || true

          gh pr create \
            --title "init: project ${{ steps.derive.outputs.name }}" \
            --body "Scaffold for new project \`${{ steps.derive.outputs.name }}\`.

          **After merge:** create the state backend per
          \`${{ steps.derive.outputs.dir }}/README.md\`, then run
          \`infra-request\` with \`project=${{ steps.derive.outputs.name }}\`." \
            --label project-init \
            --base main \
            --head "$BRANCH"
