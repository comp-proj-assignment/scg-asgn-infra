name: infra-provision

# Runs terraform create or destroy against a slot already staged on
# `main` by infra-request. Slot lives at projects/<project>/<slot>/
# and contains config/config-<env>.json files generated up front.
# Plan job uploads tfplan; apply job needs environment approval.

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project folder under projects/ (e.g. comp-proj)'
        required: true
        type: string
      catalog:
        description: 'Catalog template (must match the staged slot)'
        required: true
        type: string
      env:
        description: 'Target environment'
        required: true
        type: choice
        options: [nonprod, prod]
      action:
        description: 'create = apply, destroy = apply -destroy'
        required: true
        type: choice
        options: [create, destroy]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.7.5

jobs:
  plan:
    name: plan (${{ inputs.action }})
    runs-on: ubuntu-latest
    outputs:
      slot: ${{ steps.find.outputs.slot }}
      name: ${{ steps.find.outputs.name }}
      region: ${{ steps.common.outputs.region }}
    steps:
      - uses: actions/checkout@v4

      - name: Locate project folder
        id: proj
        run: |
          PROJECT_DIR="projects/${{ inputs.project }}"
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project folder not found: $PROJECT_DIR" >&2
            exit 1
          fi
          echo "dir=${PROJECT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Read common-config.json
        id: common
        run: |
          CC="${{ steps.proj.outputs.dir }}/common-config.json"
          {
            echo "company=$(jq -r .company "$CC")"
            echo "project=$(jq -r .project "$CC")"
            echo "bucket=$(jq -r .remote_state.bucket "$CC")"
            echo "region=$(jq -r .remote_state.region "$CC")"
            echo "lock_table=$(jq -r .remote_state.lock_table "$CC")"
          } >> "$GITHUB_OUTPUT"

      - name: Find staged slot
        id: find
        run: |
          # Slot pattern: company-project-catalog-<service>, sitting
          # directly under projects/<project>/. List candidates that
          # match the requested catalog and pick the only one — fail
          # loudly on zero or many.
          CAND=$(find "${{ steps.proj.outputs.dir }}" \
            -mindepth 1 -maxdepth 1 -type d \
            -name "${{ steps.common.outputs.company }}-${{ steps.common.outputs.project }}-${{ inputs.catalog }}-*" \
            2>/dev/null || true)
          COUNT=$(printf '%s\n' "$CAND" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "No staged slot for catalog '${{ inputs.catalog }}' in '${{ inputs.project }}'." >&2
            echo "Run infra-request first and merge the PR." >&2
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "Multiple slots match — disambiguation needed:" >&2
            printf '  %s\n' $CAND >&2
            exit 1
          fi
          SLOT="$CAND"
          NAME=$(basename "$SLOT")
          ENV_CFG="$SLOT/config/config-${{ inputs.env }}.json"
          if [ ! -f "$ENV_CFG" ]; then
            echo "Slot is missing $ENV_CFG. Re-run infra-request." >&2
            exit 1
          fi
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate backend.hcl in slot
        run: |
          # State key encodes project/slot/env so each (slot, env) pair
          # gets its own state file under one project bucket.
          cat > "${{ steps.find.outputs.slot }}/backend.hcl" <<EOF
          bucket         = "${{ steps.common.outputs.bucket }}"
          key            = "${{ steps.find.outputs.slot }}/${{ inputs.env }}/terraform.tfstate"
          region         = "${{ steps.common.outputs.region }}"
          dynamodb_table = "${{ steps.common.outputs.lock_table }}"
          encrypt        = true
          EOF

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ steps.common.outputs.region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: ${{ steps.find.outputs.slot }}
        run: terraform init -backend-config=backend.hcl

      - name: terraform plan
        working-directory: ${{ steps.find.outputs.slot }}
        run: |
          DESTROY_FLAG=""
          [ "${{ inputs.action }}" = "destroy" ] && DESTROY_FLAG="-destroy"
          # Slot is at projects/<proj>/<slot>/ (3 levels deep from
          # repo root). Walk back up:
          #   ../             → projects/<proj>/
          #   ../../          → projects/
          #   ../../../       → repo root
          # Per-env tfvars live INSIDE the slot, no traversal needed.
          terraform plan $DESTROY_FLAG \
            -var-file="../common-config.json" \
            -var-file="config/config-${{ inputs.env }}.json" \
            -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.find.outputs.name }}-${{ inputs.env }}-${{ inputs.action }}
          path: |
            ${{ steps.find.outputs.slot }}/tfplan
            ${{ steps.find.outputs.slot }}/backend.hcl
          retention-days: 7

  apply:
    name: apply (${{ inputs.action }}) — needs approval
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}-approve
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.plan.outputs.name }}-${{ inputs.env }}-${{ inputs.action }}
          path: ${{ needs.plan.outputs.slot }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ needs.plan.outputs.region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: ${{ needs.plan.outputs.slot }}
        run: terraform init -backend-config=backend.hcl

      - name: terraform apply (saved plan)
        working-directory: ${{ needs.plan.outputs.slot }}
        run: terraform apply -auto-approve tfplan
