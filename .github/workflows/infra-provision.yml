name: infra-provision

# Runs terraform create or destroy against a slot already staged on
# `main` by infra-request. Slot lives at projects/<project>/<slot>/
# and contains config/config-<env>.json files generated up front.
# Plan job uploads tfplan; apply job needs environment approval.

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project (folder under projects/)'
        required: true
        type: choice
        # Keep in sync with `ls projects/`.
        options:
          - comp-proj
          - comp-man
      slot:
        description: 'Slot folder name (e.g. cat-aws-vpc-demo). LEAVE BLANK to auto-detect when the project has exactly one slot.'
        required: false
        type: string
        default: ''
      env:
        description: 'Target environment'
        required: true
        type: choice
        options: [nonprod, prod]
      action:
        description: 'create = apply, destroy = apply -destroy'
        required: true
        type: choice
        options: [create, destroy]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.7.5

jobs:
  plan:
    name: plan (${{ inputs.action }})
    runs-on: ubuntu-latest
    outputs:
      slot: ${{ steps.find.outputs.slot }}
      name: ${{ steps.find.outputs.name }}
      region: ${{ steps.common.outputs.region }}
    steps:
      - uses: actions/checkout@v4

      - name: Locate project folder
        id: proj
        run: |
          PROJECT_DIR="projects/${{ inputs.project }}"
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project folder not found: $PROJECT_DIR" >&2
            exit 1
          fi
          echo "dir=${PROJECT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Read common-config.json
        id: common
        run: |
          CC="${{ steps.proj.outputs.dir }}/common-config.json"
          {
            echo "company=$(jq -r .company "$CC")"
            echo "project=$(jq -r .project "$CC")"
            echo "bucket=$(jq -r .remote_state.bucket "$CC")"
            echo "region=$(jq -r .remote_state.region "$CC")"
            echo "lock_table=$(jq -r .remote_state.lock_table "$CC")"
          } >> "$GITHUB_OUTPUT"

      - name: Locate staged slot
        id: find
        run: |
          PROJ_DIR="${{ steps.proj.outputs.dir }}"
          SLOT_INPUT="${{ inputs.slot }}"

          if [ -n "$SLOT_INPUT" ]; then
            # Explicit lookup
            SLOT="$PROJ_DIR/$SLOT_INPUT"
            if [ ! -d "$SLOT" ]; then
              echo "No staged slot at $SLOT." >&2
              echo "Available slots in $PROJ_DIR:" >&2
              find "$PROJ_DIR" -mindepth 1 -maxdepth 1 -type d -printf '  %f\n' >&2 || true
              echo "Run infra-request to stage one." >&2
              exit 1
            fi
          else
            # Auto-detect: only acceptable if exactly one slot exists.
            mapfile -t CAND < <(find "$PROJ_DIR" -mindepth 1 -maxdepth 1 -type d 2>/dev/null)
            COUNT=${#CAND[@]}
            if [ "$COUNT" -eq 0 ]; then
              echo "No slots in $PROJ_DIR. Run infra-request first." >&2
              exit 1
            fi
            if [ "$COUNT" -gt 1 ]; then
              echo "Project has multiple slots — pass one explicitly via the 'slot' input:" >&2
              for s in "${CAND[@]}"; do echo "  $(basename "$s")" >&2; done
              exit 1
            fi
            SLOT="${CAND[0]}"
            echo "Auto-detected slot: $(basename "$SLOT")"
          fi

          NAME=$(basename "$SLOT")
          ENV_CFG="$SLOT/configs/config-${{ inputs.env }}.json"
          if [ ! -f "$ENV_CFG" ]; then
            echo "Slot is missing $ENV_CFG." >&2
            echo "Re-run infra-request for ${NAME} to regenerate per-env configs." >&2
            exit 1
          fi
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate backend.hcl in slot
        run: |
          # State key encodes project/slot/env so each (slot, env) pair
          # gets its own state file under one project bucket.
          cat > "${{ steps.find.outputs.slot }}/backend.hcl" <<EOF
          bucket         = "${{ steps.common.outputs.bucket }}"
          key            = "${{ steps.find.outputs.slot }}/${{ inputs.env }}/terraform.tfstate"
          region         = "${{ steps.common.outputs.region }}"
          dynamodb_table = "${{ steps.common.outputs.lock_table }}"
          encrypt        = true
          EOF

      - name: Verify AWS_ROLE_ARN is set
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "Repo variable AWS_ROLE_ARN is empty." >&2
            echo "Set it at: Settings → Secrets and variables → Actions → Variables tab." >&2
            echo "Value: arn:aws:iam::<account-id>:role/<role-name> (the OIDC-assumable role)." >&2
            exit 1
          fi

      - name: Show effective approvers
        run: |
          APPROVERS_USED="${{ vars.APPROVERS || github.actor }}"
          echo "Approvers for the apply gate: $APPROVERS_USED"
          if [ -z "${{ vars.APPROVERS }}" ]; then
            echo "(falling back to the workflow triggerer — set repo variable APPROVERS to override)"
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ steps.common.outputs.region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: ${{ steps.find.outputs.slot }}
        run: terraform init -backend-config=backend.hcl

      - name: terraform plan
        working-directory: ${{ steps.find.outputs.slot }}
        run: |
          DESTROY_FLAG=""
          [ "${{ inputs.action }}" = "destroy" ] && DESTROY_FLAG="-destroy"
          # Slot is at projects/<proj>/<slot>/ (3 levels deep from
          # repo root). Walk back up:
          #   ../             → projects/<proj>/
          #   ../../          → projects/
          #   ../../../       → repo root
          # Per-env tfvars live INSIDE the slot, no traversal needed.
          terraform plan $DESTROY_FLAG \
            -var-file="../common-config.json" \
            -var-file="configs/config-${{ inputs.env }}.json" \
            -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.find.outputs.name }}-${{ inputs.env }}-${{ inputs.action }}
          path: |
            ${{ steps.find.outputs.slot }}/tfplan
            ${{ steps.find.outputs.slot }}/backend.hcl
          retention-days: 7

  apply:
    name: apply (${{ inputs.action }}) — needs approval
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write    # manual-approval creates an issue to track approval
    steps:
      # Pause here. Action opens an issue tagging APPROVERS; they comment
      # "approved" / "lgtm" to proceed, or "denied" / "deny" to cancel.
      # Times out after 60 min if no one responds.
      - name: Wait for approval
        uses: trstringer/manual-approval@v1
        timeout-minutes: 60
        with:
          secret: ${{ github.token }}
          # Default to whoever triggered the run if APPROVERS isn't set.
          # Set repo variable APPROVERS=alice,bob,@org/team for real review.
          approvers: ${{ vars.APPROVERS || github.actor }}
          minimum-approvals: 1
          issue-title: "infra-provision: ${{ inputs.action }} ${{ inputs.env }} — ${{ inputs.project }}/${{ needs.plan.outputs.name }}"
          issue-body: |
            Approval requested for terraform **${{ inputs.action }}** in **${{ inputs.env }}**.

            - Project: `${{ inputs.project }}`
            - Slot:    `${{ needs.plan.outputs.name }}`
            - Triggered by: @${{ github.actor }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Reply on this issue with:
            - `approved` / `approve` / `lgtm` / `yes` — to proceed
            - `denied`   / `deny`    / `no`           — to cancel
          exclude-workflow-initiator-as-approver: false

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.plan.outputs.name }}-${{ inputs.env }}-${{ inputs.action }}
          path: ${{ needs.plan.outputs.slot }}

      - name: Verify AWS_ROLE_ARN is set
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "Repo variable AWS_ROLE_ARN is empty (apply job)." >&2
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ needs.plan.outputs.region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: ${{ needs.plan.outputs.slot }}
        run: terraform init -backend-config=backend.hcl

      - name: terraform apply (saved plan)
        working-directory: ${{ needs.plan.outputs.slot }}
        run: terraform apply -auto-approve tfplan
