name: infra-request

# Stages a catalog version into a project slot. Does NOT touch AWS.
# Renders projects/<project>/<slot>/ from catalogs/<catalog>/<version>/
# and generates the per-env tfvars at <slot>/configs/config-<env>.json.
# Opens a PR so a human can review the slot before infra-provision runs.

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project folder under projects/ (e.g. comp-proj). Created by project-init.'
        required: true
        type: string
      catalog:
        description: 'Catalog template (e.g. cat-aws-vpc)'
        required: true
        type: string
      version:
        description: 'Catalog version folder (e.g. v1.0.0). Must exist under catalogs/<catalog>/.'
        required: true
        type: string
        default: v1.0.0
      env:
        description: 'Target environment (drives <slot>/configs/config-<env>.json generation)'
        required: true
        type: choice
        options: [nonprod, prod]
        default: nonprod

permissions:
  contents: write
  pull-requests: write

jobs:
  stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate project folder
        id: proj
        run: |
          PROJECT_DIR="projects/${{ inputs.project }}"
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project folder not found: $PROJECT_DIR" >&2
            echo "Run the project-init workflow first." >&2
            exit 1
          fi
          echo "dir=${PROJECT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Read common-config.json
        id: common
        run: |
          CC="${{ steps.proj.outputs.dir }}/common-config.json"
          {
            echo "company=$(jq -r .company "$CC")"
            echo "project=$(jq -r .project "$CC")"
            echo "bucket=$(jq -r .remote_state.bucket "$CC")"
            echo "region=$(jq -r .remote_state.region "$CC")"
            echo "lock_table=$(jq -r .remote_state.lock_table "$CC")"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve catalog version
        id: cat
        run: |
          SRC="catalogs/${{ inputs.catalog }}/${{ inputs.version }}"
          BASE_CFG="$SRC/configs/config.json"
          if [ ! -d "$SRC" ]; then
            echo "Catalog version not found: $SRC" >&2
            ls "catalogs/${{ inputs.catalog }}/" >&2 || true
            exit 1
          fi
          if [ ! -f "$BASE_CFG" ]; then
            echo "Catalog $SRC is missing configs/config.json" >&2
            exit 1
          fi
          SERVICE_NAME=$(jq -r '.service_name // .name' "$BASE_CFG")
          echo "src=${SRC}" >> "$GITHUB_OUTPUT"
          echo "base_cfg=${BASE_CFG}" >> "$GITHUB_OUTPUT"
          echo "service_name=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Derive slot path
        id: derive
        run: |
          # Slot is just the catalog name under the project folder:
          # projects/<project>/<catalog>/. One slot per (project, catalog).
          NAME="${{ inputs.catalog }}"
          SLOT="${{ steps.proj.outputs.dir }}/${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"

      - name: Render catalog version into slot
        run: |
          SLOT="${{ steps.derive.outputs.slot }}"

          # Preserve any per-env configs from prior requests so adding
          # a second env doesn't wipe the first one.
          BACKUP=$(mktemp -d)
          if [ -d "$SLOT/configs" ]; then
            for f in "$SLOT"/configs/config-*.json; do
              [ -e "$f" ] && cp "$f" "$BACKUP/"
            done
          fi

          rm -rf "$SLOT"
          mkdir -p "$SLOT"
          cp -r "${{ steps.cat.outputs.src }}/." "$SLOT/"

          for f in "$BACKUP"/config-*.json; do
            [ -e "$f" ] && cp "$f" "$SLOT/configs/"
          done
          rm -rf "$BACKUP"

          echo "${{ inputs.catalog }}@${{ inputs.version }}" \
            > "$SLOT/.catalog-version"

      - name: Generate config-${{ inputs.env }}.json inside slot
        run: |
          OUT="${{ steps.derive.outputs.slot }}/configs/config-${{ inputs.env }}.json"
          jq --arg env "${{ inputs.env }}" '
            . + { environment: $env }
              | .tags = ((.tags // {}) + { env: $env })
          ' "${{ steps.cat.outputs.base_cfg }}" > "$OUT"
          echo "→ $OUT"

      - name: Generate backend.hcl
        run: |
          # Slot lives 3 levels deep (projects/<proj>/<slot>/). State key
          # encodes the full project/slot/env path → unique per (slot, env).
          cat > "${{ steps.derive.outputs.slot }}/backend.hcl" <<EOF
          bucket         = "${{ steps.common.outputs.bucket }}"
          key            = "${{ steps.derive.outputs.slot }}/${{ inputs.env }}/terraform.tfstate"
          region         = "${{ steps.common.outputs.region }}"
          dynamodb_table = "${{ steps.common.outputs.lock_table }}"
          encrypt        = true
          EOF

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="infra-request/${{ inputs.project }}/${{ inputs.catalog }}-${{ inputs.version }}-${{ inputs.env }}"
          git config user.name  "comp-request-bot"
          git config user.email "comp-request-bot@users.noreply.github.com"

          # See note in project-init.yml — delete any stale branch so
          # the push is a CREATE (avoids the `workflows: write`
          # restriction that blocks updates touching workflow files).
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add "${{ steps.derive.outputs.slot }}"

          if git diff --staged --quiet; then
            echo "No changes — slot was already up to date for this catalog version."
            exit 0
          fi

          git commit -m "request: ${{ inputs.catalog }}@${{ inputs.version }} for ${{ inputs.project }}/${{ inputs.env }}"
          git push -u origin "$BRANCH"

          gh label create infra-request \
            --color 1d76db \
            --description "Stages a catalog slot for a project" \
            --force >/dev/null 2>&1 || true

          gh pr create \
            --title "request: ${{ inputs.catalog }}@${{ inputs.version }} for ${{ inputs.project }}/${{ inputs.env }}" \
            --body "Stages \`${{ steps.derive.outputs.slot }}\` from \`${{ steps.cat.outputs.src }}\`.

          **After merge:** run the \`infra-provision\` workflow with
          \`project=${{ inputs.project }}\`, \`catalog=${{ inputs.catalog }}\`,
          \`env=${{ inputs.env }}\`, and \`action=create\` to apply." \
            --label infra-request \
            --base main \
            --head "$BRANCH"
