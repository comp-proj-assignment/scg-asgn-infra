name: infra-request

# Stages a catalog version into a project slot. Does NOT touch AWS.
# Renders projects/<project>/<catalog>-<service_name>/ from
# template/catalogs/<catalog>/<version>/ and generates per-env tfvars at
# <slot>/configs/config-<env>.json for ALL envs (env is a runtime
# choice in infra-provision, not a request choice).

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project (folder under projects/). Add new projects via project-init.'
        required: true
        type: choice
        # Keep in sync with `ls projects/`. Add a line per project.
        options:
          - comp-proj
          - comp-man
      catalog:
        description: 'Catalog template'
        required: true
        type: choice
        # Keep in sync with `ls template/catalogs/`. Add a line per catalog.
        options:
          - cat-aws-vpc
          - cat-aws-eks
          - cat-aws-helm-observability
          - cat-aws-helm-argocd
          - cat-aws-helm-network
      version:
        description: 'Catalog version folder (e.g. v1.0.0). Must exist under template/catalogs/<catalog>/.'
        required: true
        type: string
        default: v1.0.0
      service_name:
        description: 'Service name. Becomes the slot suffix (<catalog>-<service_name>) and the `service_name` field in generated configs.'
        required: true
        type: string
        default: demo

permissions:
  contents: write
  pull-requests: write

env:
  ENVS: 'nonprod prod'   # space-separated; per-env config generated for each

jobs:
  stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate project folder
        id: proj
        run: |
          PROJECT_DIR="projects/${{ inputs.project }}"
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "Project folder not found: $PROJECT_DIR" >&2
            echo "Run the project-init workflow first." >&2
            exit 1
          fi
          echo "dir=${PROJECT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Resolve catalog version
        id: cat
        run: |
          SRC="template/catalogs/${{ inputs.catalog }}/${{ inputs.version }}"
          BASE_CFG="$SRC/configs/config.json"
          if [ ! -d "$SRC" ]; then
            echo "Catalog version not found: $SRC" >&2
            ls "template/catalogs/${{ inputs.catalog }}/" >&2 || true
            exit 1
          fi
          if [ ! -f "$BASE_CFG" ]; then
            echo "Catalog $SRC is missing configs/config.json" >&2
            exit 1
          fi
          echo "src=${SRC}" >> "$GITHUB_OUTPUT"
          echo "base_cfg=${BASE_CFG}" >> "$GITHUB_OUTPUT"

      - name: Derive slot path
        id: derive
        run: |
          # projects/<project>/<catalog>-<service_name>/.
          # One slot per (project, catalog, service_name).
          NAME="${{ inputs.catalog }}-${{ inputs.service_name }}"
          SLOT="${{ steps.proj.outputs.dir }}/${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"

      - name: Render catalog version into slot
        run: |
          SLOT="${{ steps.derive.outputs.slot }}"

          # Preserve any per-env configs from prior requests so a
          # version bump doesn't wipe customizations.
          BACKUP=$(mktemp -d)
          if [ -d "$SLOT/configs" ]; then
            for f in "$SLOT"/configs/config-*.json; do
              [ -e "$f" ] && cp "$f" "$BACKUP/"
            done
          fi

          rm -rf "$SLOT"
          mkdir -p "$SLOT"
          cp -r "${{ steps.cat.outputs.src }}/." "$SLOT/"

          for f in "$BACKUP"/config-*.json; do
            [ -e "$f" ] && cp "$f" "$SLOT/configs/"
          done
          rm -rf "$BACKUP"

          echo "${{ inputs.catalog }}@${{ inputs.version }}" \
            > "$SLOT/.catalog-version"

      - name: Generate per-env config files
        run: |
          for env in $ENVS; do
            OUT="${{ steps.derive.outputs.slot }}/configs/config-${env}.json"
            # Override service_name with the workflow input + inject env-aware fields.
            jq --arg env "$env" --arg svc "${{ inputs.service_name }}" '
              . + { environment: $env, service_name: $svc }
                | .tags = ((.tags // {}) + { env: $env })
            ' "${{ steps.cat.outputs.base_cfg }}" > "$OUT"
            echo "→ $OUT"
          done

      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="infra-request/${{ inputs.project }}/${{ inputs.catalog }}-${{ inputs.service_name }}-${{ inputs.version }}"
          git config user.name  "comp-request-bot"
          git config user.email "comp-request-bot@users.noreply.github.com"

          # Delete any stale branch so the push is a CREATE — pushing
          # an UPDATE that touches workflow files is rejected for
          # GITHUB_TOKEN (workflows: write only grantable to PAT/App).
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add "${{ steps.derive.outputs.slot }}"

          if git diff --staged --quiet; then
            echo "No changes — slot was already up to date for this catalog version."
            exit 0
          fi

          git commit -m "request: ${{ inputs.catalog }}-${{ inputs.service_name }}@${{ inputs.version }} for ${{ inputs.project }}"
          git push -u origin "$BRANCH"

          gh label create infra-request \
            --color 1d76db \
            --description "Stages a catalog slot for a project" \
            --force >/dev/null 2>&1 || true

          gh pr create \
            --title "request: ${{ inputs.catalog }}-${{ inputs.service_name }}@${{ inputs.version }} for ${{ inputs.project }}" \
            --body "Stages \`${{ steps.derive.outputs.slot }}\` from \`${{ steps.cat.outputs.src }}\`.
          Per-env configs generated for: \`$ENVS\`.

          **After merge:** run the \`infra-provision\` workflow with
          \`project=${{ inputs.project }}\`, \`catalog=${{ inputs.catalog }}\`,
          \`service_name=${{ inputs.service_name }}\`, \`env=<nonprod|prod>\`,
          and \`action=create\` to apply." \
            --label infra-request \
            --base main \
            --head "$BRANCH"
