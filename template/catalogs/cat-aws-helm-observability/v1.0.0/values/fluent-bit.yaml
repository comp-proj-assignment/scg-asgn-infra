#   company: company
#   project: mandatory
#   nodegroup: facilities

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

serviceMonitor:
  enabled: false

config:
  service: |
    [SERVICE]
        Daemon         Off
        Flush          5
        Log_Level      info
        Parsers_File   parsers.conf
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020
        Health_Check   On

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        multiline.parser  cri
        Read_from_Head    True
        Refresh_Interval  10
        Mem_Buf_Limit     64MB
        Skip_Long_Lines   On
        DB                /var/log/flb-tail.db

  filters: |
    [FILTER]
        Name                 kubernetes
        Match                kube.*
        Kube_URL             https://kubernetes.default.svc:443
        Merge_Log            On
        Merge_Log_Key        log_processed
        K8S-Logging.Parser   On
        K8S-Logging.Exclude  On
        Annotations          Off
        Labels               On

  outputs: |
    [OUTPUT]
        Name              loki
        Match             *
        host              loki.logging.svc.cluster.local
        port              3100
        line_format       json
        auto_kubernetes_labels on
        labels            job=fluent-bit
        tenant_id         ""
